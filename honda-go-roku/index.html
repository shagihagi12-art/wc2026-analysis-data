<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0b0e">
<title>HONDA GO-ROKU</title>
<style>
:root{--bg:#0a0b0e;--panel:#151821;--line:#303646;--ink:#fafaf8;--muted:#a8afbd;--gold:#f1c74d}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100dvh;background:radial-gradient(100% 55% at 50% -10%,#30374e 0%,#141824 45%,#0a0b0e 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}button,input{font:inherit}button{cursor:pointer}#app{width:min(100%,560px);margin:0 auto;padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 88px)}.top{display:flex;justify-content:space-between;align-items:center}.brand{font-size:25px;font-weight:950;letter-spacing:-.08em;line-height:.86}.brand small{display:block;color:var(--gold);font-size:9px;letter-spacing:.15em;margin-top:7px}.count{border:1px solid var(--line);background:#171b25;color:#fff;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:900}.hero{padding:26px 0 18px}.eyebrow{margin:0;color:var(--gold);font-size:10px;font-weight:950;letter-spacing:.15em}.hero h1{margin:9px 0 11px;font-size:clamp(39px,11vw,56px);line-height:1;letter-spacing:-.09em}.hero h1 b{color:var(--gold)}.lead{margin:0;color:var(--muted);font-size:14px;line-height:1.65}.daily{margin:22px 0 12px;padding:16px;border:1px solid #3a4153;border-radius:20px;background:linear-gradient(135deg,#1e2535,#10131b)}.daily label{font-size:10px;font-weight:950;letter-spacing:.14em;color:var(--gold)}.daily strong{display:block;margin:10px 0 7px;font-size:22px;line-height:1.38;letter-spacing:-.045em}.daily span{font-size:12px;color:var(--muted)}.actions{display:grid;grid-template-columns:1fr auto;gap:9px}.primary,.sub{border-radius:14px;padding:14px;border:0;font-weight:950}.primary{background:var(--gold);color:#1f1805}.sub{border:1px solid var(--line);background:#181c26;color:#fff}.gacha{margin:11px 0 27px;padding:21px 18px;border:1px solid #544a67;border-radius:23px;overflow:hidden;position:relative;background:linear-gradient(135deg,#211938,#141724 60%,#15352f)}.gacha:after{content:"✦";position:absolute;right:13px;top:-33px;font-size:125px;color:#fff1}.gacha h2{margin:5px 0;font-size:29px;letter-spacing:-.07em}.gacha p:not(.eyebrow){position:relative;z-index:1;color:#d9d9e2;font-size:13px;line-height:1.55}.gacha button{position:relative;z-index:1;width:100%;border:0;border-radius:14px;background:#efe8ff;color:#261943;padding:16px;font-weight:950}.note{font-size:10px!important;text-align:center;letter-spacing:.04em;opacity:.7}.head{display:flex;justify-content:space-between;align-items:end;margin-bottom:12px}.head h2{margin:4px 0 0;font-size:25px;letter-spacing:-.06em}.result{color:var(--muted);font-size:11px}.search{display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--line);border-radius:14px;background:#141720}.search input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:#fff;padding:13px 0}.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:#171a23;color:#ccd0da;padding:8px 11px;font-size:12px;font-weight:850}.chip.on{background:#fafaf8;color:#0a0b0e;border-color:#fafaf8}.list{display:grid;gap:10px;margin-top:12px}.quote{display:block;width:100%;text-align:left;border:1px solid var(--line);border-radius:17px;background:linear-gradient(135deg,#181c25,#11131a);color:#fff;padding:15px}.quote:active{transform:scale(.992)}.meta{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--muted)}.tag{font-size:10px;font-weight:950;letter-spacing:.1em}.L{color:#f1c74d}.E{color:#c79dff}.R{color:#7bc7ee}.quote strong{display:block;margin:10px 0 6px;font-size:19px;line-height:1.45;letter-spacing:-.04em}.quote small{font-size:12px;color:var(--muted)}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:3;width:min(100%,560px);display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px calc(11px + env(safe-area-inset-bottom));background:linear-gradient(transparent,#0a0b0e 35%)}.nav button{border:0;border-radius:13px;background:#181c25;color:#c9cdd6;padding:11px 6px;font-size:11px;font-weight:900}.nav button:first-child{background:var(--gold);color:#1d1707}.overlay{position:fixed;z-index:9;inset:0;display:none;align-items:end;background:#000a;padding:16px}.overlay.show{display:flex}.sheet{width:min(100%,560px);max-height:88dvh;overflow:auto;background:#171b25;border:1px solid #40485b;border-radius:24px 24px 17px 17px;padding:20px}.sheet-top{display:flex;justify-content:space-between;align-items:center}.x{width:36px;height:36px;border:0;border-radius:50%;background:#292e3a;color:#fff;font-size:22px}.ball{width:122px;height:122px;display:grid;place-items:center;margin:27px auto 16px;border-radius:50%;background:radial-gradient(circle at 35% 27%,#fff,#e5e9f2 42%,#8d98aa);box-shadow:0 12px 34px #0008;color:#202632;font-size:24px;font-weight:950}.draw{text-align:center}.draw .q{font-size:26px;font-weight:950;line-height:1.45;letter-spacing:-.05em;margin:12px 0}.draw .c{font-size:13px;color:var(--muted)}.sheet-action{width:100%;margin-top:18px;border:0;border-radius:14px;padding:15px;background:var(--gold);color:#1d1707;font-weight:950}.sheet-action.dark{margin-top:9px;background:#292e3a;color:#fff}.detail strong{display:block;margin:21px 0 15px;font-size:25px;line-height:1.48;letter-spacing:-.055em}.detail p{line-height:1.7;color:#d1d4dc;font-size:14px}.source{border-top:1px solid var(--line);padding-top:14px;color:var(--muted)!important;font-size:12px!important}.detail-actions{display:flex;gap:9px;margin-top:20px}.detail-actions button{flex:1;border:1px solid var(--line);border-radius:13px;background:#242934;color:#fff;padding:13px;font-weight:900}.detail-actions .saved{color:var(--gold);border-color:var(--gold)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:17px 0}.stat{padding:10px;border:1px solid var(--line);border-radius:14px;background:#11141c;text-align:center}.stat b{display:block;font-size:18px}.stat small{color:var(--muted);font-size:10px}.col-item{display:flex;width:100%;justify-content:space-between;gap:10px;padding:12px 0;border:0;border-bottom:1px solid var(--line);background:transparent;color:#fff;text-align:left;font-size:13px}.empty{text-align:center;color:var(--muted);padding:30px 0}.toast{position:fixed;z-index:20;left:50%;bottom:90px;transform:translate(-50%,20px);opacity:0;pointer-events:none;transition:.2s;background:#f7f7f5;color:#17191e;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:850}.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<main id="app"></main><aside id="overlay" class="overlay"><section id="sheet" class="sheet"></section></aside><div id="toast" class="toast"></div>
<script>
const raw=`11番、（ガクポ）がウザい！！！^O^相手の11番・ガクポを見ながら^R
1にガクポ、2にガクポ、3にガクポ！^O^危険人物を繰り返し警戒^L
そろそろいける気がする^O^ゴール約6秒前^E
僕の前にはね、解説するためのシステムがあるんすけど、やり方が何一つわかりません^O^解説用システムに戸惑いながら^E
ええ、やばっ！！イチキュウサンのウィンガー！！！^O^相手のウインガーに驚いて^R
彼、ダンフリースはどこのチームなんすか？^O^相手選手について実況に尋ねる^R
おい！レフェリー！お前何やっとんねん！イエローやお前！^O^伊東純也にぶつかった審判を見て^L
デパイとか勝ってる時に調子乗って出すから！！^O^相手の選手起用を見て^R
オランダはね、とにかくデカいです！トイレの便器の高さもめちゃ高いです！^O^オランダの大きさを独自に説明^E
誰？誰？^O^選手を見失って^R
これなんすか？^O^ハイドレーションブレイクを見て^R
北欧は平和主義者多いかもしれない！唯一平和じゃないのはイブラヒモビッチちゃんか！会場のどっかにおるぞ！気をつけよ！！！^S^北欧とイブラヒモビッチの話題から^E
麻也と拓実、ベンチに入れたらいいのに、アカンの？^S^ベンチメンバーを見て^R
交渉して増やしてもらうとか^S^ベンチ枠の話の続き^R
え！？これなんですか？ヤラセじゃなくて、自分で考えたってことですか…？俺にも配ってくれよ！！^S^観客のペンライトを見て^E
マリオとルイージも喜んでるよ！^S^スタンドの様子を見て^R
え、何！？田中さんのソックス、めちゃくちゃ破られてない？？^S^田中選手のソックスを見て^R
森保さん、もしかしたら前半に板倉さん代えてたこと忘れてたんと思ちゃう？^S^選手交代を見て^E
え、なに？肉離れた？^S^選手の様子を見て^R
さすがパルマっす！ブッフォンの後継者なんちゃうか！^S^GKのプレーを見て^R
鎌田さんうま〜！左足ピョンや！！！^T^鎌田選手のプレーを見て^R
なんすか？涼しくなるやつすか？テクノロジーすね完全に^T^会場設備を見て^R
彩艶さんウォーミングアップでベタ付近まで蹴ってましたよ！！^T^ウォーミングアップを見て^R
股、サイドネットは神です！！^T^シュートコースの話^E
相手10番の選手、空振ってない？何利き？^T^相手10番のプレーを見て^R
右で空振ってんの！！！！？^T^「右利き」と聞いた直後^R
今日はもう勝ちます！日本は99.999999%勝つ！サッカー界でたまにしか出ないイケイケドンドンです！^T^試合の流れを見て^L
冨安さん素晴らしい！このブロックで10分話したい^T^冨安選手の守備を見て^E
イケイケドンドンですよ！^T^試合の勢いを表現^R
むっちゃ使うじゃないですか、俺の言葉！^T^実況の言葉を聞いて^E
2位だとブラジルと当たる可能性があるでしょ？なんなん、これ！？くじ運、なんなん！？^T^決勝トーナメントの組み合わせを見て^R
ベニシウス^B^ブラジルの選手名を噛みしめるように^R
1にウォ！2にウォ！！3にウォ！！！^B^攻撃の局面で^L
イエエエエス！！！^B^カゼミロにイエローが出て^E
めちゃめちゃ走るな、前田さん！！^B^前田選手の走力を見て^R
前田は180分戦えます！^B^前田選手の運動量の話^E
試合出てない僕ものどカラカラですわ！^B^給水の場面で^E
ちょっと水飲みますわ…^B^自ら給水に入る^R
マルキーニョスがいって！！！今の普通にキープできるやん！！^B^ブラジルのプレーを見て^R
オイオイオイ！！！あ、水か。びっくりした〜〜^B^給水の動きを見て一瞬驚く^L
これがワールドカップ、アゲインストブラジルですよ〜！^B^ブラジル戦の空気を表現^E
何分ですか！？何分ですか！？^B^試合時間を気にして^R
カミゼロ^B^カゼミロの呼び方^R`;
const N={O:'オランダ戦',S:'スウェーデン戦',T:'チュニジア戦',B:'ブラジル戦'},Q=raw.split('\n').map((v,i)=>{let[q,m,c,r]=v.split('^');return{id:i,q,m,c,r}});let active='A',search='',fav=new Set(JSON.parse(localStorage.getItem('honda-fav')||'[]')),col=new Set(JSON.parse(localStorage.getItem('honda-col')||'[]'));const app=document.querySelector('#app'),overlay=document.querySelector('#overlay'),sheet=document.querySelector('#sheet'),toast=document.querySelector('#toast');
const esc=s=>s.replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[x]));const find=id=>Q.find(x=>x.id===Number(id));function save(){localStorage.setItem('honda-fav',JSON.stringify([...fav]));localStorage.setItem('honda-col',JSON.stringify([...col]))}function flash(s){toast.textContent=s;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}function visible(){let x=search.toLowerCase();return Q.filter(v=>(active==='A'||v.m===active)&&(!x||(v.q+v.c+N[v.m]).toLowerCase().includes(x)))}function render(){let d=Q[(new Date().getDate()+new Date().getMonth()*7)%Q.length],v=visible();app.innerHTML=`<header class="top"><div class="brand">HONDA<br>GO-ROKU<small>W杯 解説語録アーカイブ</small></div><button class="count" data-a="col">▣ ${col.size}/${Q.length}</button></header><section class="hero"><p class="eyebrow">UNOFFICIAL COMMENTARY ARCHIVE</p><h1>本田圭佑、<br><b>今日のひと言。</b></h1><p class="lead">解説なのに、気づけば語録。<br>試合の熱量を、あとから掘り返す。</p><article class="daily"><label>DAILY GO-ROKU</label><strong>「${esc(d.q)}」</strong><span>${N[d.m]} / ${esc(d.c)}</span></article><div class="actions"><button class="primary" data-a="random">↻ 語録を引く</button><button class="sub" data-a="detail" data-id="${d.id}">詳細を見る</button></div></section><section class="gacha"><p class="eyebrow">FREE / NO LOGIN</p><h2>語録ガチャ</h2><p>引いた語録は、あなたのコレクションに残る。<br>まだ出会っていない本田節を引こう。</p><button data-a="gacha">✦ ガチャを回す</button><p class="note">LEGEND 6%　EPIC 24%　RARE 70%　/　端末内保存</p></section><section><div class="head"><div><p class="eyebrow">MATCH ARCHIVE</p><h2>語録アーカイブ</h2></div><span class="result">${v.length} / ${Q.length}</span></div><label class="search">⌕<input id="search" placeholder="ガクポ、水、イケイケ…" value="${esc(search)}"></label><div class="chips">${[['A','すべて'],['O',N.O],['S',N.S],['T',N.T],['B',N.B]].map(([m,n])=>`<button class="chip ${active===m?'on':''}" data-a="filter" data-m="${m}">${n}</button>`).join('')}</div><div class="list">${v.length?v.map(x=>`<button class="quote" data-a="detail" data-id="${x.id}"><div class="meta"><span>${N[x.m]}</span><span class="tag ${x.r}">${x.r==='L'?'LEGEND':x.r==='E'?'EPIC':'RARE'}</span></div><strong>「${esc(x.q)}」</strong><small>${esc(x.c)}</small></button>`).join(''):'<p class="empty">語録が見つからない。</p>'}</div></section><nav class="nav"><button data-a="top">ARCHIVE</button><button data-a="gacha">GACHA</button><button data-a="col">COLLECTION</button></nav>`;document.querySelector('#search').addEventListener('input',e=>{search=e.target.value;render()})}
function open(h){sheet.innerHTML=h;overlay.classList.add('show')}function close(){overlay.classList.remove('show')}function detail(q){open(`<div class="sheet-top"><span class="tag ${q.r}">${q.r==='L'?'LEGEND':q.r==='E'?'EPIC':'RARE'} / ${N[q.m]}</span><button class="x" data-a="close">×</button></div><article class="detail"><strong>「${esc(q.q)}」</strong><p>${esc(q.c)}</p><p class="source">出典状態：ユーザー提供画像を起点にした転記データ。逐語性・映像タイムスタンプは照合中。</p><div class="detail-actions"><button data-a="fav" data-id="${q.id}" class="${fav.has(q.id)?'saved':''}">${fav.has(q.id)?'★ 保存済み':'☆ 保存する'}</button><button data-a="share" data-id="${q.id}">共有</button></div></article>`)}function gacha(){let n=Math.random()*100,r=n<6?'L':n<30?'E':'R',p=Q.filter(x=>x.r===r),q=p[Math.floor(Math.random()*p.length)],fresh=!col.has(q.id);col.add(q.id);save();open(`<div class="sheet-top"><b>語録ガチャ</b><button class="x" data-a="close">×</button></div><div class="draw"><div class="ball">HG</div><span class="tag ${q.r}">${q.r==='L'?'LEGEND':q.r==='E'?'EPIC':'RARE'} / ${fresh?'NEW':'DUPLICATE'}</span><div class="q">「${esc(q.q)}」</div><div class="c">${N[q.m]} / ${esc(q.c)}</div><button class="sheet-action" data-a="detail" data-id="${q.id}">この語録を見る</button><button class="sheet-action dark" data-a="gacha">もう一度回す</button></div>`);render()}function collection(){let x=[...col].map(find).filter(Boolean);open(`<div class="sheet-top"><b>COLLECTION <small style="color:#a8afbd">${x.length}/${Q.length}</small></b><button class="x" data-a="close">×</button></div><div class="stats"><div class="stat"><b>${x.filter(v=>v.r==='L').length}</b><small>LEGEND</small></div><div class="stat"><b>${x.filter(v=>v.r==='E').length}</b><small>EPIC</small></div><div class="stat"><b>${x.filter(v=>v.r==='R').length}</b><small>RARE</small></div></div>${x.length?x.map(v=>`<button class="col-item" data-a="detail" data-id="${v.id}"><span>${esc(v.q)}</span><small class="tag ${v.r}">${v.r==='L'?'LEGEND':v.r==='E'?'EPIC':'RARE'}</small></button>`).join(''):'<p class="empty">まだコレクションは空です。<br>ガチャを回してみよう。</p>'}`)}
document.addEventListener('click',e=>{let b=e.target.closest('[data-a]');if(!b)return;let a=b.dataset.a;if(a==='close')return close();if(a==='filter'){active=b.dataset.m;return render()}if(a==='random')return detail(Q[Math.floor(Math.random()*Q.length)]);if(a==='gacha')return gacha();if(a==='col')return collection();if(a==='top')return window.scrollTo({top:0,behavior:'smooth'});if(a==='detail')return detail(find(b.dataset.id));if(a==='fav'){let id=Number(b.dataset.id);fav.has(id)?fav.delete(id):fav.add(id);save();detail(find(id));render();return flash(fav.has(id)?'保存しました':'保存を外しました')}if(a==='share'){let q=find(b.dataset.id),text=`「${q.q}」\n— ${N[q.m]} / HONDA GO-ROKU`;return navigator.share?navigator.share({text}):navigator.clipboard?.writeText(text).then(()=>flash('コピーしました'))}});overlay.addEventListener('click',e=>{if(e.target===overlay)close()});render();
</script>
</body>
</html>
